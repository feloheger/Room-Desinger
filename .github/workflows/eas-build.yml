name: EAS Build & Update

# Trigger: bei jedem Push auf main einen Preview-Update auslösen und
# zusätzlich (manuell oder optional automatisch) einen echten EAS Build
# für Production anstoßen.
on:
  push:
    branches:
      - main
  # Erlaubt zusätzlich das manuelle Anstoßen über die GitHub-UI,
  # z.B. um gezielt einen Production-Build zu starten.
  workflow_dispatch:
    inputs:
      build_profile:
        description: "EAS Build Profile (development | preview | production)"
        required: false
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  update:
    name: EAS Update (Preview)
    runs-on: ubuntu-latest
    # Nur bei automatischem Push auf main ausführen — nicht bei manuellem Dispatch.
    if: github.event_name == 'push'
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v4

      - name: 🟢 Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🚀 Expo & EAS CLI einrichten
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Abhängigkeiten installieren
        run: npm ci

      - name: 🔍 TypeScript-Check
        run: npm run type-check

      - name: "EAS Update veröffentlichen (Branch: preview)"
        run: |
          eas update \
            --branch preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
        env:
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  build:
    name: EAS Build
    runs-on: ubuntu-latest
    # Nur bei manuellem Dispatch ausführen, damit echte (kreditverbrauchende)
    # native Builds nicht bei jedem Push automatisch starten.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v4

      - name: 🟢 Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🚀 Expo & EAS CLI einrichten
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Abhängigkeiten installieren
        run: npm ci

      - name: 🔍 TypeScript-Check
        run: npm run type-check

      - name: 🏗️ EAS Build starten
        run: |
          eas build \
            --platform all \
            --profile ${{ github.event.inputs.build_profile }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
