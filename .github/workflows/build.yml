name: Build APK
on:
  push:
    branches:
      - main
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install EAS CLI manually
        run: npm install -g eas-cli
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Debug expo config
        run: ./node_modules/.bin/expo config --json 2>&1 || true
        continue-on-error: true
      - name: Build APK
        run: EAS_NO_VCS=1 eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
